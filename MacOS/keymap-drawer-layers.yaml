_g: &g {t: '', type: ghost}

layers:
  Main:
    - &func_row [Esc, F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12]
    - &symbol_row ['`', '!', '@', '#', '_', ':', ';', '"', '?', '*', '+', '-', '=', '⌫']
    - &base_tab_row [Tab, *g, *g, *g, *g, *g, *g, *g, *g, *g, *g, *g, *g, '|']
    - &caps_row ['.', *g, *g, *g, *g, *g, *g, *g, *g, *g, *g, *g, Enter]
    - &shift_row [',', *g, *g, *g, *g, *g, *g, *g, *g, *g, '/', '\']
    - &bottom_row [Del, ⌃, ⌥, ⌘, Shift/Space, Nav, Lang, 'Vol+', 'Bri-', 'Vol-', 'Bri+']

  Shift:
    - *func_row
    - [
        '`',
        {t: '1', type: held},
        {t: '2', type: held},
        {t: '3', type: held},
        {t: '4', type: held},
        {t: '5', type: held},
        {t: '6', type: held},
        {t: '7', type: held},
        {t: '8', type: held},
        {t: '9', type: held},
        {t: '0', type: held},
        '-', '=', '⌫'
      ]
    - *base_tab_row
    - *caps_row
    - *shift_row
    - [Del, ⌃, ⌥, ⌘, {t: Shift, type: held}, Nav, Lang, 'Vol+', 'Bri-', 'Vol-', 'Bri+']

  Nav:
    - *func_row
    - *symbol_row
    - [
        Tab,
        {t: '^', type: held},
        {t: '&', type: held},
        {t: '[', type: held},
        {t: ']', type: held},
        {t: '₽', type: held},
        *g, *g,
        {t: '↑', type: held},
        *g, *g, *g, *g, '|'
      ]
    - [
        '.',
        {t: '<', type: held},
        {t: '>', type: held},
        {t: '(', type: held},
        {t: ')', type: held},
        {t: '$', type: held},
        {t: 'Home', type: held},
        {t: '←', type: held},
        {t: '↓', type: held},
        {t: '→', type: held},
        {t: 'End', type: held},
        *g, Enter
      ]
    - [
        ',',
        {t: '~', type: held},
        *g,
        {t: '{', type: held},
        {t: '}', type: held},
        {t: '%', type: held},
        *g, *g, *g, *g,
        '/', '\'
      ]
    - [Del, ⌃, ⌥, ⌘, Space, {t: Nav, type: held}, Lang, 'Vol+', 'Bri-', 'Vol-', 'Bri+']